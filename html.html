<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Listar imagens de uma pasta</title>
</head>

<body>
  <form id="myForm">
    <label for="name">Nome:</label>
    <input type="text" id="name" name="name"><br>
    <label for="phone">Telefone:</label>
    <input type="tel" id="phone" name="phone"><br>
    <label for="message">Mensagem:</label>
    <textarea id="message" name="message"></textarea><br>
    <input type="submit" value="Enviar">
  </form>

  <script>
    const form = document.querySelector('#myForm');

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const name = document.querySelector('#name').value;
      const phone = document.querySelector('#phone').value;
      const message = document.querySelector('#message').value;

      // chame a função para enviar a mensagem pelo WhatsApp
      sendToWhatsApp(name, phone, message);
    });

  </script>

  <script>
    function sendToWhatsApp(name, phone, message) {
      const url = `https://wa.me/${phone}?text=${encodeURIComponent(`Olá, meu nome é ${name} e gostaria de enviar a seguinte mensagem: ${message}`)}`;

      window.open(url);
    }

  </script>
</body>

</html>
